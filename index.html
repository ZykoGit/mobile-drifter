<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Neon Drift Rush</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #05030a;
      overflow: hidden;
      touch-action: none;
      font-family: system-ui, sans-serif;
    }
    canvas {
      display: block;
      background: radial-gradient(circle at center, #12001f 0%, #020008 60%, #000000 100%);
    }
    #overlay {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 14px;
      opacity: 0.7;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="overlay">NEON DRIFT RUSH</div>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let w, h, cx, cy;
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      cx = w / 2;
      cy = h * 0.7;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game state
    let lastTime = 0;
    let speed = 0.4;          // base scroll speed
    let maxSpeed = 3.5;
    let accel = 0.00025;      // how fast speed ramps up
    let drift = 0;            // -1 to 1
    let driftTarget = 0;
    let carX = 0;             // -1 to 1 (relative to center)
    let shake = 0;
    let particles = [];

    // Input
    let isPointerDown = false;
    let pointerStartX = 0;
    let pointerCurrentX = 0;

    function onPointerDown(x) {
      isPointerDown = true;
      pointerStartX = x;
      pointerCurrentX = x;
    }
    function onPointerMove(x) {
      if (!isPointerDown) return;
      pointerCurrentX = x;
      const dx = pointerCurrentX - pointerStartX;
      driftTarget = Math.max(-1, Math.min(1, dx / (w * 0.3)));
    }
    function onPointerUp() {
      isPointerDown = false;
      driftTarget = 0;
    }

    canvas.addEventListener('mousedown', e => onPointerDown(e.clientX));
    window.addEventListener('mousemove', e => onPointerMove(e.clientX));
    window.addEventListener('mouseup', onPointerUp);

    canvas.addEventListener('touchstart', e => {
      const t = e.touches[0];
      onPointerDown(t.clientX);
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      const t = e.touches[0];
      onPointerMove(t.clientX);
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', onPointerUp);

    // Keyboard fallback
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a') driftTarget = -1;
      if (e.key === 'ArrowRight' || e.key === 'd') driftTarget = 1;
    });
    window.addEventListener('keyup', e => {
      if (['ArrowLeft','ArrowRight','a','d'].includes(e.key)) driftTarget = 0;
    });

    function spawnDriftParticles(x, y, dir) {
      for (let i = 0; i < 6; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() * 2 - 1) * 0.4 + dir * 0.8,
          vy: -Math.random() * 0.5 - 0.2,
          life: 400 + Math.random() * 200,
          age: 0,
          color: Math.random() < 0.5 ? '#ff00ff' : '#00e5ff'
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.age += dt;
        if (p.age >= p.life) {
          particles.splice(i, 1);
          continue;
        }
        p.x += p.vx * dt;
        p.y += p.vy * dt;
      }
    }

    function drawParticles() {
      particles.forEach(p => {
        const t = p.age / p.life;
        const alpha = 1 - t;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3 + 3 * (1 - t), 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function drawRoad(time) {
      // Road perspective lines
      const laneCount = 5;
      const roadWidthBottom = w * 0.9;
      const roadWidthTop = w * 0.1;
      const roadCenterX = cx + carX * w * 0.18;

      // Vertical "distance" lines
      const lineCount = 18;
      for (let i = 0; i < lineCount; i++) {
        const t = ((i / lineCount) + (time * speed * 0.002)) % 1;
        const y = cy - (t * h * 0.9);
        const width = roadWidthTop + (roadWidthBottom - roadWidthTop) * (y / h);
        const alpha = 1 - t;
        ctx.strokeStyle = `rgba(0, 229, 255, ${alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(roadCenterX - width / 2, y);
        ctx.lineTo(roadCenterX + width / 2, y);
        ctx.stroke();
      }

      // Side edges
      ctx.strokeStyle = 'rgba(255, 0, 255, 0.7)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(roadCenterX - roadWidthBottom / 2, h);
      ctx.lineTo(roadCenterX - roadWidthTop / 2, h * 0.1);
      ctx.moveTo(roadCenterX + roadWidthBottom / 2, h);
      ctx.lineTo(roadCenterX + roadWidthTop / 2, h * 0.1);
      ctx.stroke();
    }

    function drawCar() {
      const x = cx + carX * w * 0.2;
      const y = cy;
      const carWidth = w * 0.12;
      const carHeight = h * 0.12;

      // Trail
      const trailLen = h * 0.25;
      const gradient = ctx.createLinearGradient(x, y, x, y + trailLen);
      gradient.addColorStop(0, 'rgba(255, 0, 255, 0.9)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(x - carWidth * 0.25, y);
      ctx.lineTo(x + carWidth * 0.25, y);
      ctx.lineTo(x + carWidth * 0.5, y + trailLen);
      ctx.lineTo(x - carWidth * 0.5, y + trailLen);
      ctx.closePath();
      ctx.fill();

      // Body
      ctx.fillStyle = '#ffffff';
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(drift * 0.35);
      ctx.fillStyle = '#f5f5f5';
      ctx.fillRect(-carWidth / 2, -carHeight / 2, carWidth, carHeight);

      // Neon edges
      ctx.strokeStyle = '#ff00ff';
      ctx.lineWidth = 4;
      ctx.strokeRect(-carWidth / 2, -carHeight / 2, carWidth, carHeight);

      // Windows
      ctx.fillStyle = '#111122';
      ctx.fillRect(-carWidth * 0.3, -carHeight * 0.35, carWidth * 0.6, carHeight * 0.3);

      ctx.restore();

      // Drift particles
      if (Math.abs(drift) > 0.2) {
        spawnDriftParticles(x - carWidth * 0.4 * Math.sign(drift), y + carHeight * 0.3, -Math.sign(drift));
      }
    }

    function applyScreenTransform() {
      const t = Math.min(speed / maxSpeed, 1);
      const zoom = 1 + t * 0.15;
      const ellipse = 1 - t * 0.18;

      const shakeAmount = shake;
      const sx = (Math.random() * 2 - 1) * shakeAmount;
      const sy = (Math.random() * 2 - 1) * shakeAmount;

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.translate(cx + sx, cy + sy);
      ctx.scale(zoom, zoom * ellipse);
      ctx.translate(-cx, -cy);
    }

    function resetTransform() {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function gameLoop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      // Speed ramp
      speed += accel * dt;
      if (speed > maxSpeed) speed = maxSpeed;

      // Drift smoothing
      drift += (driftTarget - drift) * 0.02 * dt;
      carX += drift * 0.0015 * dt;
      carX = Math.max(-1, Math.min(1, carX));

      // Shake decays
      shake *= 0.9;

      // Update particles
      updateParticles(dt);

      // Clear
      resetTransform();
      ctx.clearRect(0, 0, w, h);

      // Apply warp / zoom / shake
      applyScreenTransform();

      // Draw world
      drawRoad(timestamp);
      drawParticles();
      drawCar();

      resetTransform();

      requestAnimationFrame(gameLoop);
    }

    // Trigger some shake when speed crosses thresholds (placeholder)
    setInterval(() => {
      if (speed > maxSpeed * 0.6) {
        shake = Math.max(shake, 6);
      } else if (speed > maxSpeed * 0.3) {
        shake = Math.max(shake, 3);
      }
    }, 600);

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
