<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neon Drift Rush — Top Down</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/IMG_3959" type="image/png">
  <link rel="apple-touch-icon" href="assets/IMG_3959" type="image/png">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Home screen -->
  <div id="home-screen">
    <div class="home-inner">
      <h1>NEON DRIFT RUSH</h1>
      <p>Top-down cyberpunk drifting.</p>

      <label for="track-select">Level</label>
      <select id="track-select"></select>
      <div id="track-lock-msg"></div>

      <button id="btn-start">Tap to Start</button>
      <small>Use on-screen arrows on mobile or keyboard on desktop.</small>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <div>Speed: <span id="hud-speed">0</span></div>
      <div>Drift: <span id="hud-drift">0</span>%</div>
    </div>
    <div class="hud-center">
      <div>Score: <span id="hud-score">0</span></div>
      <div>Best: <span id="hud-best">0</span></div>
    </div>
    <div class="hud-right">
      <div>Lap: <span id="hud-lap">1</span></div>
      <div>Track: <span id="hud-track">-</span></div>
    </div>
  </div>

  <!-- Mobile controls -->
  <div id="mobile-controls">
    <button id="btn-left">&#9664;</button>
    <button id="btn-right">&#9654;</button>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/track.js"></script>
  <script src="js/car.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
