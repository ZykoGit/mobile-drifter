<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neon Drift Rush</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- Simple neon SVG favicon (data URI) -->
  <link rel="icon" type="image/svg+xml"
        href="IMG_"
  <!-- Apple touch icon (same SVG as data URI) -->
  <link rel="apple-touch-icon"
        href="IMG_"
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Home screen -->
  <div id="home-screen">
    <div class="home-inner">
      <h1>NEON DRIFT RUSH</h1>
      <p>Top-down procedural cyberpunk drifting.</p>
      <button id="btn-start">Tap to Start</button>
      <small>Use arrows on mobile or keyboard on desktop.</small>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <div>Speed: <span id="hud-speed">0</span></div>
      <div>Drift: <span id="hud-drift">0</span>%</div>
    </div>
    <div class="hud-center">
      <div>Score: <span id="hud-score">0</span></div>
      <div>Best: <span id="hud-best">0</span></div>
    </div>
    <div class="hud-right">
      <div>Lap: <span id="hud-lap">1</span></div>
      <div>Track: <span id="hud-track">PROC-1</span></div>
    </div>
  </div>

  <!-- Mobile controls (shown only on mobile via JS) -->
  <div id="mobile-controls">
    <button id="btn-left">&#9664;</button>
    <button id="btn-right">&#9654;</button>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/track.js"></script>
  <script src="js/car.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
