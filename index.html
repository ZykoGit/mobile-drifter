<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neon Drift Rush</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="hud-left">
      <div>Speed: <span id="hud-speed">0</span></div>
      <div>Drift: <span id="hud-drift">0</span>%</div>
    </div>
    <div class="hud-center">
      <div>Score: <span id="hud-score">0</span></div>
      <div>Best: <span id="hud-best">0</span></div>
    </div>
    <div class="hud-right">
      <div>Lap: <span id="hud-lap">1</span></div>
      <div>Track: <span id="hud-track">PROC-1</span></div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/track.js"></script>
  <script src="js/car.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
