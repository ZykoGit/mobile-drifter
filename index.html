<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neon Drift Rush</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />

  <!-- Simple neon SVG favicon (data URI) -->
  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff00ff'/%3E%3Cstop offset='1' stop-color='%2300e5ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='12' ry='12' fill='%23050010'/%3E%3Cpath d='M10 46 L26 18 L38 30 L54 18 L38 46 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='2'/%3E%3C/svg%3E" />

  <!-- Apple touch icon (same SVG as data URI) -->
  <link rel="apple-touch-icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff00ff'/%3E%3Cstop offset='1' stop-color='%2300e5ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='12' ry='12' fill='%23050010'/%3E%3Cpath d='M10 46 L26 18 L38 30 L54 18 L38 46 Z' fill='url(%23g)' stroke='%23ffffff' stroke-width='2'/%3E%3C/svg%3E" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Home screen -->
  <div id="home-screen">
    <div class="home-inner">
      <h1>NEON DRIFT RUSH</h1>
      <p>Top-down procedural cyberpunk drifting.</p>
      <button id="btn-start">Tap to Start</button>
      <small>Use arrows on mobile or keyboard on desktop.</small>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-left">
      <div>Speed: <span id="hud-speed">0</span></div>
      <div>Drift: <span id="hud-drift">0</span>%</div>
    </div>
    <div class="hud-center">
      <div>Score: <span id="hud-score">0</span></div>
      <div>Best: <span id="hud-best">0</span></div>
    </div>
    <div class="hud-right">
      <div>Lap: <span id="hud-lap">1</span></div>
      <div>Track: <span id="hud-track">PROC-1</span></div>
    </div>
  </div>

  <!-- Mobile controls (shown only on mobile via JS) -->
  <div id="mobile-controls">
    <button id="btn-left">&#9664;</button>
    <button id="btn-right">&#9654;</button>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/track.js"></script>
  <script src="js/car.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
